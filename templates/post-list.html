<div class="posts">
    {% for post in section.pages %}
    <div class="post">
        <h2>
            <a href="{{ post.permalink | safe }}">{{ post.title }}</a>
        </h2>
        <em class="date">
            {# {{ post.date | date(format="%d %b %Y") }} #}
            Date: {{ post.date }}
        </em>
        <p class="summary">
            {{ post.summary }}
        </p>
    </div>
    {% endfor %}
</div>
