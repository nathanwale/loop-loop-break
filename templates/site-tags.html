<div class="site-tags">
    <h2>Site Tags</h2>
    <ul>
        {% set tags = get_taxonomy(kind="tags") %}
        {% for tag in tags.items | sort(attribute="name") %}
            {% if tag != "post" %}
            <li>
                <a class="tag" href="/tags/{{tag.name | slugify}}">
                    {{tag.name}} 
                </a>
            </li>
            {% endif %}
        {% endfor %}
    </ul>
</div>
